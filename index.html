<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bis wir uns wiedersehen</title>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #1e293b;
      --card: rgba(255, 255, 255, 0.75);
      --text: #0f172a;
      --muted: #475569;
      --accent: #38bdf8;
      --accent-strong: #0ea5e9;
      --number-countdown: #f472b6;
      --bar-bg: rgba(14, 165, 233, 0.15);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 760px;
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 32px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(14, 165, 233, 0.15);
    }

    h1 {
      margin-top: 0;
      font-size: 2rem;
      margin-bottom: 12px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 1.1rem;
      margin-bottom: 32px;
    }

    .countdown {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .time-box {
      background: rgba(255, 255, 255, 0.65);
      border-radius: 18px;
      padding: 20px 10px;
      border: 1px solid rgba(56, 189, 248, 0.15);
    }

    .number {
      display: block;
      font-size: 2.2rem;
      font-weight: bold;
      color: var(--number-countdown);
    }

    .label {
      display: block;
      margin-top: 8px;
      font-size: 0.95rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .date {
      margin-top: 10px;
      color: var(--muted);
      font-size: 1rem;
    }

    .message {
      margin-top: 24px;
      font-size: 1.1rem;
      line-height: 1.5;
    }

    .progress-section {
      margin-top: 32px;
      text-align: left;
    }

    .progress-header {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      margin-bottom: 10px;
      font-size: 0.95rem;
      color: var(--muted);
      flex-wrap: wrap;
    }

    .progress-bar {
      width: 100%;
      height: 20px;
      background: var(--bar-bg);
      border-radius: 999px;
      overflow: hidden;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent-strong));
      border-radius: 999px;
      transition: width 0.8s ease;
    }

    .progress-text {
      margin-top: 10px;
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
    }

    @media (max-width: 600px) {
      .countdown {
        grid-template-columns: repeat(2, 1fr);
      }

      h1 {
        font-size: 1.6rem;
      }

      .number {
        font-size: 1.8rem;
      }

      .progress-header {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Bis wir uns wiedersehen ❤️</h1>
    <p class="subtitle">Countdown bis zu unserem nächsten Treffen</p>

    <div class="countdown">
      <div class="time-box">
        <span class="number" id="days">0</span>
        <span class="label">Tage</span>
      </div>
      <div class="time-box">
        <span class="number" id="hours">0</span>
        <span class="label">Stunden</span>
      </div>
      <div class="time-box">
        <span class="number" id="minutes">0</span>
        <span class="label">Minuten</span>
      </div>
      <div class="time-box">
        <span class="number" id="seconds">0</span>
        <span class="label">Sekunden</span>
      </div>
    </div>

    <p class="date" id="target-date"></p>
    <p class="message" id="message">Jede Sekunde bringt uns näher zusammen.</p>

    <div class="progress-header">
  <span id="progress-label">Schon geschafft:</span>
</div>

      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>

      <p class="progress-text" id="progress-text">0% geschafft</p>
    </div>
  </div>

  <script>
    // HIER ANPASSEN:
    const lastMeetingDate = new Date("2026-03-07T14:12:00");
    const nextMeetingDate = new Date("2026-03-27T05:20:00");

    const daysEl = document.getElementById("days");
    const hoursEl = document.getElementById("hours");
    const minutesEl = document.getElementById("minutes");
    const secondsEl = document.getElementById("seconds");
    const targetDateEl = document.getElementById("target-date");
    const messageEl = document.getElementById("message");
    const progressFill = document.getElementById("progress-fill");
    const progressText = document.getElementById("progress-text");

    function formatDate(date) {
      return date.toLocaleString("de-DE", {
        dateStyle: "full",
        timeStyle: "short"
      });
    }

    targetDateEl.textContent = "Nächstes Treffen: " + formatDate(nextMeetingDate);

    function updateCountdown() {
      const now = new Date();
      const diff = nextMeetingDate - now;

      if (diff <= 0) {
        daysEl.textContent = "0";
        hoursEl.textContent = "0";
        minutesEl.textContent = "0";
        secondsEl.textContent = "0";
        messageEl.textContent = "Endlich ist es so weit 💙";
      } else {
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / (1000 * 60)) % 60);
        const seconds = Math.floor((diff / 1000) % 60);

        daysEl.textContent = days;
        hoursEl.textContent = hours;
        minutesEl.textContent = minutes;
        secondsEl.textContent = seconds;
      }

      updateProgress();
    }

    function updateProgress() {
      const now = new Date();

      const total = nextMeetingDate - lastMeetingDate;
      const elapsed = now - lastMeetingDate;

      let progress = (elapsed / total) * 100;

      if (progress < 0) progress = 0;
      if (progress > 100) progress = 100;

      progressFill.style.width = progress.toFixed(1) + "%";
      progressText.textContent = progress.toFixed(1) + "% des Wartens geschafft";
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
